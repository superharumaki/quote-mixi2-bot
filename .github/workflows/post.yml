name: Quote Bot

on:
  schedule:
    - cron: '19 21 * * *'
  workflow_dispatch:

concurrency:
  group: bot-post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.6'

      - name: Download dependencies
        run: go mod download

      - name: Build check
        run: go build ./...

      - name: Run Bot
        run: go run .
        env:
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          TOKEN_URL: https://application-auth.mixi.social/oauth2/token
          API_ADDRESS: application-api.mixi.social:443

      - name: Commit state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --cached --quiet && exit 0
          git commit -m "update state"
          git pull --rebase
          git push
